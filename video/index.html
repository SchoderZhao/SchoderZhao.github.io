<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>我的主页</title>
</head>
<body>

<h1>欢迎光临</h1>

<!-- 这里会直接显示执行结果，手机能看到 -->
<div id="status" style="margin:20px; padding:10px; border:1px solid #ccc;"></div>

<script src="https://pv.sohu.com/cityjson?ie=utf-8"></script>

<form id="myform" action="https://wj.qq.com/s2/25804282/8fe7/" method="post" style="display:none">
  <input name="ip" id="ip_input">
  <input name="city" id="city_input">
  <input name="time" id="time_input">
</form>

<script>
// 手机页面直接显示执行状态
var status = document.getElementById('status');

try {
  // 1. 先看IP有没有拿到
  if (typeof returnCitySN === 'undefined') {
    status.innerHTML = "❌ 获取IP失败";
  } else {
    document.getElementById("ip_input").value = returnCitySN.cip;
    document.getElementById("city_input").value = returnCitySN.cname;
    document.getElementById("time_input").value = new Date().toLocaleString();
    
    // 2. 提交表单
    document.getElementById("myform").submit();
    
    // 页面显示成功
    status.innerHTML = 
      "✅ JS执行成功<br>" +
      "IP：" + returnCitySN.cip + "<br>" +
      "城市：" + returnCitySN.cname + "<br>" +
      "已尝试提交问卷";
  }
} catch(e) {
  status.innerHTML = "❌ 执行出错：" + e.message;
}
</script>

</body>
</html>
